{% load static %}
<div id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <a href="{% url 'index' %}" class="flex items-center gap-3 no-underline">
            <div class="nav-logo-icon">
                <i class="fas fa-home" style="color:#fff;font-size:15px"></i>
            </div>
            <div class="sidebar-logo-text transition-opacity duration-300">
                <span class="nav-logo-main block">ZAMBIA</span>
                <span class="nav-logo-sub block">RENTALS</span>
            </div>
        </a>
    </div>

    <div class="sidebar-nav">
        <!-- Overview Group -->
        <div class="nav-group-label sidebar-label transition-opacity duration-300">Overview</div>
        <a href="/" class="sidebar-item" id="nav-home" title="Find Homes">
            <i class="fas fa-search"></i>
            <span class="sidebar-text">Find Homes</span>
        </a>

        <!-- Dashboard Link (Dynamic) -->
        <a href="#" id="sidebarDashboardLink" class="sidebar-item" style="display:none;" title="My Dashboard">
            <i class="fas fa-columns"></i>
            <span class="sidebar-text">Dashboard</span>
        </a>

        <!-- Assets Group (Conditional Logic in JS) -->
        <div class="nav-group-label sidebar-label transition-opacity duration-300">Assets & Activity</div>
        <a href="#" id="sidebarPropertiesLink" class="sidebar-item" style="display:none;" title="Properties">
            <i class="fas fa-building"></i>
            <span class="sidebar-text">Properties</span>
        </a>
        <a href="#" id="sidebarApplicationsLink" class="sidebar-item" style="display:none;" title="Applications">
            <i class="fas fa-file-contract"></i>
            <span class="sidebar-text">Applications</span>
        </a>

        <!-- Finance Group (Conditional Logic in JS) -->
        <div class="nav-group-label sidebar-label transition-opacity duration-300">Finance</div>
        <a href="#" id="sidebarFinanceLink" class="sidebar-item" style="display:none;" title="Finances">
            <i class="fas fa-wallet"></i>
            <span class="sidebar-text">Finances</span>
        </a>
        <a href="#" id="sidebarAnalyticsLink" class="sidebar-item" style="display:none;" title="Analytics">
            <i class="fas fa-chart-line"></i>
            <span class="sidebar-text">Analytics</span>
        </a>

        <!-- System Group -->
        <div class="nav-group-label sidebar-label transition-opacity duration-300">System</div>
        <a href="#" class="sidebar-item" id="nav-settings" title="Settings">
            <i class="fas fa-cog"></i>
            <span class="sidebar-text">Settings</span>
        </a>
    </div>

    <!-- Sidebar Footer -->
    <div class="mt-auto p-4 border-t" style="border-color: var(--border-color)">
        <button id="sidebarCollapseBtn" class="sidebar-item w-full border-none bg-transparent cursor-pointer" title="Collapse Sidebar">
            <i class="fas fa-angle-double-left transition-transform duration-300" id="collapseIcon"></i>
            <span class="sidebar-text">Collapse</span>
        </button>
    </div>
</div>
