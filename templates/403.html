{% extends 'base.html' %}
{% block title %}Access Denied | Zambia Rentals{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;padding:40px 20px">
    <div class="card fade-in-up" style="max-width:480px;width:100%;padding:56px 48px;text-align:center;box-shadow:var(--shadow-xl)">
        <div style="width:72px;height:72px;background:var(--color-red-light);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px">
            <i class="fas fa-lock" style="font-size:28px;color:var(--color-red)"></i>
        </div>
        <h1 style="font-size:2rem;font-weight:900;letter-spacing:-0.04em;margin-bottom:12px">403: Access Denied</h1>
        <p style="font-size:15px;color:var(--color-text-secondary);max-width:320px;margin:0 auto 32px;line-height:1.6">
            You don't have permission to access this page. This area is reserved for authorized personnel only.
        </p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
            <a href="{% url 'index' %}" class="btn btn-primary">
                <i class="fas fa-home"></i> Back to Home
            </a>
            <a href="{% url 'login' %}" class="btn btn-ghost">
                Sign In
            </a>
        </div>
    </div>
</div>
{% endblock %}
