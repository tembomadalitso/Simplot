{% extends 'base.html' %}
{% load static %}
{% block title %}Access Denied | Zambia Rentals{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center text-center animate-slide-up py-20">
    <div class="w-24 h-24 rounded-3xl bg-error-bg/20 border border-error/20 flex items-center justify-center text-error text-4xl mb-8 shadow-2xl">
        <i class="fas fa-shield-halved"></i>
    </div>
    <h1 class="text-4xl font-black mb-6">Access Restricted</h1>
    <p class="text-lg font-medium text-secondary max-w-md mx-auto mb-12">
        You do not have the necessary security clearance to access this portal. This incident has been logged.
    </p>
    <div class="flex flex-col md:flex-row gap-4">
        <button onclick="window.history.back()" class="btn btn-ghost border border-color px-8 h-12">
            <i class="fas fa-arrow-left text-xs mr-2"></i> Go Back
        </button>
        <a href="{% url 'index' %}" class="btn btn-primary px-8 h-12">
            <i class="fas fa-home text-xs mr-2"></i> Return Home
        </a>
    </div>
</div>
{% endblock %}
