{% extends 'base.html' %}

{% block title %}Access Denied | Zambia Rentals{% endblock %}

{% block content %}

        <div class="w-24 h-24 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm">

        </p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{% url 'index' %}" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl font-bold transition shadow-lg shadow-indigo-200">
                Back to Home
            </a>
            <a href="{% url 'login' %}" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-8 py-3 rounded-xl font-bold transition">

            </a>

    </div>
</div>
{% endblock %}
