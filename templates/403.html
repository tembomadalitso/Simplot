{% extends 'base.html' %}
{% load static %}
{% block title %}Access Denied | Zambia Rentals{% endblock %}

{% block content %}
<div class="flex-column items-center justify-center text-center fade-up delay-1" style="min-height: 60vh;">
    <div class="flex-center mb-6" style="width: 80px; height: 80px; border-radius: 24px; background: var(--color-error-bg); border: 1px solid var(--color-error); color: var(--color-error); font-size: 32px; box-shadow: var(--shadow-md);">
        <i class="fas fa-shield-halved"></i>
    </div>
    <h1 class="font-black tracking-tighter mb-4" style="font-size: 3rem;">Access Restricted</h1>
    <p class="text-lg font-medium mb-8" style="color: var(--text-secondary); max-width: 400px;">
        You don't have the necessary clearance to view this high-security portal.
    </p>
    <div class="flex-row gap-3">
        <a href="javascript:history.back()" class="btn btn-ghost">
            <i class="fas fa-arrow-left"></i> Go Back
        </a>
        <a href="{% url 'index' %}" class="btn btn-primary">
            <i class="fas fa-home"></i> Return Home
        </a>
    </div>
</div>
{% endblock %}
