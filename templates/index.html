{% extends 'base.html' %}
{% load static %}

{% block content %}

<!-- Hero -->
<header class="text-center mb-14 fade-in-up" style="padding:48px 0 24px">
    <div style="display:inline-flex;align-items:center;gap:8px;background:var(--color-primary-light);color:var(--color-primary);padding:6px 16px;border-radius:var(--radius-full);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:20px">
        <i class="fas fa-shield-alt"></i> Verified & Compliant Listings
    </div>
    <h1 style="font-size:clamp(2rem,5vw,3.5rem);font-weight:900;letter-spacing:-0.04em;line-height:1.1;margin-bottom:16px">
        Find Your Next Home<br>
        <span style="background:linear-gradient(135deg,#4f46e5,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">in Zambia</span>
    </h1>
    <p style="font-size:1.1rem;color:var(--color-text-secondary);max-width:520px;margin:0 auto">
        Secure, ZRA-compliant rental listings across Zambia — from Lusaka to Livingstone.
    </p>
</header>

<!-- Search Bar -->
<section class="glass mb-12 fade-in-up" style="border-radius:var(--radius-xl);padding:20px 24px;box-shadow:var(--shadow-md);animation-delay:0.06s">
    <div style="display:flex;flex-wrap:wrap;gap:12px">
        <div style="position:relative;flex:1;min-width:200px">
            <i class="fas fa-search" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--color-text-muted);font-size:14px;pointer-events:none"></i>
            <input type="text" id="searchInput" placeholder="Search by district or area…"
                   class="form-input" style="padding-left:42px;border-radius:var(--radius-md)">
        </div>
        <div style="position:relative;min-width:180px">
            <i class="fas fa-filter" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--color-text-muted);font-size:13px;pointer-events:none"></i>
            <select id="categoryFilter" class="form-select" style="padding-left:40px;cursor:pointer">
                <option value="">All Categories</option>
                <option value="RESIDENTIAL">Residential</option>
                <option value="BOARDING">Boarding</option>
                <option value="LODGE">Lodge</option>
            </select>
            <i class="fas fa-chevron-down" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--color-text-muted);font-size:11px;pointer-events:none"></i>
        </div>
    </div>
</section>

<!-- Property Grid -->
<div id="property-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px">
    <!-- Skeleton loaders -->
    <div class="property-card" style="animation-delay:0s">
        <div class="skeleton" style="height:200px"></div>
        <div style="padding:20px 24px">
            <div class="skeleton" style="height:16px;width:60%;margin-bottom:10px;border-radius:6px"></div>
            <div class="skeleton" style="height:12px;width:40%;margin-bottom:20px;border-radius:6px"></div>
            <div style="display:flex;justify-content:space-between">
                <div class="skeleton" style="height:20px;width:30%;border-radius:6px"></div>
                <div class="skeleton" style="height:20px;width:25%;border-radius:6px"></div>
            </div>
        </div>
    </div>
    <div class="property-card" style="animation-delay:0.06s">
        <div class="skeleton" style="height:200px"></div>
        <div style="padding:20px 24px">
            <div class="skeleton" style="height:16px;width:70%;margin-bottom:10px;border-radius:6px"></div>
            <div class="skeleton" style="height:12px;width:45%;margin-bottom:20px;border-radius:6px"></div>
            <div style="display:flex;justify-content:space-between">
                <div class="skeleton" style="height:20px;width:30%;border-radius:6px"></div>
                <div class="skeleton" style="height:20px;width:25%;border-radius:6px"></div>
            </div>
        </div>
    </div>
    <div class="property-card" style="animation-delay:0.12s">
        <div class="skeleton" style="height:200px"></div>
        <div style="padding:20px 24px">
            <div class="skeleton" style="height:16px;width:55%;margin-bottom:10px;border-radius:6px"></div>
            <div class="skeleton" style="height:12px;width:35%;margin-bottom:20px;border-radius:6px"></div>
            <div style="display:flex;justify-content:space-between">
                <div class="skeleton" style="height:20px;width:30%;border-radius:6px"></div>
                <div class="skeleton" style="height:20px;width:25%;border-radius:6px"></div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_scripts %}
<script src="{% static 'js/app.js' %}"></script>
{% endblock %}
