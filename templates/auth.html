{% extends 'base.html' %}
{% load static %}

{% block title %}Access Zambia Rentals{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh] animate-[fadeIn_0.5s_ease-out]">
    <div class="glass-card w-full max-w-md p-8 rounded-3xl mx-auto shadow-xl">
        <div class="text-center mb-8">
            <h2 id="authTitle" class="text-3xl font-bold text-slate-900">Welcome Back</h2>
            <p id="authSubtitle" class="text-slate-500 mt-2">Enter your details to access your account</p>
        </div>

        <form id="authForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 ml-1 mb-1">Username</label>
                <input type="text" id="username" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 transition">
            </div>

            <div id="extraFields" class="hidden space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 ml-1 mb-1">Email Address</label>
                    <input type="email" id="email" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 ml-1 mb-1">Account Type</label>
                    <select id="user_type" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 transition">
                        <option value="TENANT">Tenant</option>
                        <option value="LANDLORD">Landlord</option>
                        <option value="ZRA">ZRA Official</option>
                        <option value="MINISTRY">Ministry Official</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 ml-1 mb-1">Password</label>
                <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 transition">
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition transform active:scale-95 shadow-lg shadow-indigo-200">
                <span id="btnText">Sign In</span>
            </button>
        </form>

        <div class="mt-8 text-center">
            <button id="toggleAuth" class="text-indigo-600 font-semibold text-sm hover:underline">
                Don't have an account? Create one
            </button>
        </div>
        
        <div id="authMessage" class="mt-4 text-center text-sm font-medium hidden"></div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{% static 'js/auth.js' %}"></script>
{% endblock %}
