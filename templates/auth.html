{% extends 'base.html' %}
{% load static %}

{% block title %}Sign In | Zambia Rentals{% endblock %}

{% block content %}
<div class="animate-slide-up flex items-center justify-center py-10 md:py-20">
    <div class="relative w-full max-w-md">
        <!-- Background accents -->
        <div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/20 blur-[100px] rounded-full"></div>
        <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-success/10 blur-[100px] rounded-full"></div>

        <div class="card p-12 !rounded-3xl border-color shadow-2xl relative z-10 overflow-hidden">
            <!-- Header -->
            <div class="text-center mb-10">
                <div class="w-16 h-16 rounded-2xl bg-primary-light flex items-center justify-center text-primary text-2xl mx-auto mb-6 shadow-inner">
                    <i class="fas fa-home"></i>
                </div>
                <h2 id="authTitle" class="text-3xl font-black mb-2">Welcome Back</h2>
                <p id="authSubtitle" class="text-sm font-medium text-muted">Sign in to manage your property journey</p>
            </div>

            <!-- Form -->
            <form id="authForm" class="flex flex-col gap-6">
                <div class="flex flex-col gap-2">
                    <label class="text-[11px] font-black uppercase tracking-widest text-muted ml-1">Username</label>
                    <div class="relative group">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-muted group-focus-within:text-primary transition-colors"></i>
                        <input type="text" id="username" required class="filter-input w-full h-12 !pl-11" placeholder="your_username">
                    </div>
                </div>

                <div id="extraFields" class="flex flex-col gap-6 hidden">
                    <div class="flex flex-col gap-2">
                        <label class="text-[11px] font-black uppercase tracking-widest text-muted ml-1">Email Address</label>
                        <div class="relative group">
                            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-muted group-focus-within:text-primary transition-colors"></i>
                            <input type="email" id="email" class="filter-input w-full h-12 !pl-11" placeholder="you@example.com">
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-[11px] font-black uppercase tracking-widest text-muted ml-1">Account Type</label>
                        <div class="relative group">
                            <i class="fas fa-id-badge absolute left-4 top-1/2 -translate-y-1/2 text-muted group-focus-within:text-primary transition-colors"></i>
                            <select id="user_type" class="filter-input w-full h-12 !pl-11 cursor-pointer">
                                <option value="TENANT">Tenant / Seeker</option>
                                <option value="LANDLORD">Landlord / Owner</option>
                                <option value="ZRA">ZRA Official</option>
                                <option value="MINISTRY">Ministry Official</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-[11px] font-black uppercase tracking-widest text-muted ml-1">Password</label>
                    <div class="relative group">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-muted group-focus-within:text-primary transition-colors"></i>
                        <input type="password" id="password" required class="filter-input w-full h-12 !pl-11" placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary h-14 !text-base shadow-primary/40 mt-4">
                    <span id="btnText">Continue to Platform</span>
                    <i class="fas fa-arrow-right text-xs ml-2"></i>
                </button>
            </form>

            <div class="text-center mt-8">
                <button id="toggleAuth" class="text-xs font-black uppercase tracking-widest text-muted hover:text-primary transition-all">
                    Don't have an account? <span class="text-primary underline">Sign Up</span>
                </button>
            </div>

            <div id="authMessage" class="mt-6 text-center text-xs font-bold p-4 rounded-xl hidden"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{% static 'js/auth.js' %}"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const extraFields = document.getElementById('extraFields');
    const authTitle   = document.getElementById('authTitle');
    const authSubtitle= document.getElementById('authSubtitle');
    const btnText     = document.getElementById('btnText');
    const toggleAuth  = document.getElementById('toggleAuth');
    const msgDiv      = document.getElementById('authMessage');

    toggleAuth.addEventListener('click', () => {
        const isLogin = extraFields.classList.contains('hidden');
        if (isLogin) {
            extraFields.classList.remove('hidden');
            authTitle.textContent    = 'Join the Platform';
            authSubtitle.textContent = 'Start your premium real estate experience';
            btnText.textContent      = 'Create Account';
            toggleAuth.innerHTML     = 'Already have an account? <span class="text-primary underline">Sign In</span>';
        } else {
            extraFields.classList.add('hidden');
            authTitle.textContent    = 'Welcome Back';
            authSubtitle.textContent = 'Sign in to manage your property journey';
            btnText.textContent      = 'Continue to Platform';
            toggleAuth.innerHTML     = "Don't have an account? <span class="text-primary underline">Sign Up</span>";
        }
    });
});
</script>
{% endblock %}
