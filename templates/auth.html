{% extends 'base.html' %}
{% load static %}

{% block title %}Sign In | Zambia Rentals{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-12 animate-fade-in">
    <div class="card p-12 shadow-2xl border-white/50 bg-white/70 backdrop-blur-xl">

        <!-- Auth Header -->
        <div class="text-center mb-10 space-y-4">
            <div class="w-16 h-16 bg-indigo-600 rounded-[22px] flex items-center justify-center mx-auto shadow-xl shadow-indigo-100">
                <i class="fas fa-home text-white text-2xl"></i>
            </div>
            <div>
                <h2 id="authTitle" class="text-3xl font-black text-slate-900 tracking-tight">Welcome Back</h2>
                <p id="authSubtitle" class="text-slate-400 font-bold text-sm mt-2">Sign in to manage your property journey</p>
            </div>
        </div>

        <!-- Auth Form -->
        <form id="authForm" class="space-y-6">
            <div class="form-group !mb-0">
                <label class="form-label">Username</label>
                <div class="relative group">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-indigo-600 transition-colors"></i>
                    <input type="text" id="username" required class="form-input !pl-12 !py-4" placeholder="your_username">
                </div>
            </div>

            <div id="extraFields" class="hidden space-y-6 animate-fade-in">
                <div class="form-group !mb-0">
                    <label class="form-label">Email Address</label>
                    <div class="relative group">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-indigo-600 transition-colors"></i>
                        <input type="email" id="email" class="form-input !pl-12 !py-4" placeholder="you@example.com">
                    </div>
                </div>
                <div class="form-group !mb-0">
                    <label class="form-label">Account Type</label>
                    <div class="relative group">
                        <i class="fas fa-id-badge absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-indigo-600 transition-colors"></i>
                        <select id="user_type" class="form-select !pl-12 !py-4 font-bold text-slate-700">
                            <option value="TENANT">Tenant / Seeker</option>
                            <option value="LANDLORD">Landlord / Owner</option>
                            <option value="ZRA">ZRA Official</option>
                            <option value="MINISTRY">Ministry Official</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-group !mb-0">
                <label class="form-label">Password</label>
                <div class="relative group">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-indigo-600 transition-colors"></i>
                    <input type="password" id="password" required class="form-input !pl-12 !py-4" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full !py-4 !rounded-2xl !text-sm group">
                <span id="btnText">Continue to Platform</span>
                <i class="fas fa-arrow-right text-xs group-hover:translate-x-1 transition-transform ml-1"></i>
            </button>
        </form>

        <div class="mt-10 text-center">
            <button id="toggleAuth" class="text-indigo-600 hover:text-indigo-800 text-sm font-black transition-colors uppercase tracking-widest">
                Don't have an account? Sign Up
            </button>
        </div>

        <div id="authMessage" class="mt-8 hidden animate-fade-in">
            <!-- Dynamic alerts from JS -->
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{% static 'js/auth.js' %}"></script>
<script>
const _extraFields = document.getElementById('extraFields');
const _authTitle = document.getElementById('authTitle');
const _authSubtitle = document.getElementById('authSubtitle');
const _btnText = document.getElementById('btnText');
const _toggleAuth = document.getElementById('toggleAuth');

_toggleAuth.addEventListener('click', () => {
    const isLogin = _extraFields.classList.contains('hidden');
    if (isLogin) {
        _extraFields.classList.remove('hidden');
        _authTitle.textContent = "Join the Platform";
        _authSubtitle.textContent = "Start your premium real estate experience";
        _btnText.textContent = "Create Account";
        _toggleAuth.textContent = "Already have an account? Sign In";
    } else {
        _extraFields.classList.add('hidden');
        _authTitle.textContent = "Welcome Back";
        _authSubtitle.textContent = "Sign in to manage your property journey";
        _btnText.textContent = "Continue to Platform";
        _toggleAuth.textContent = "Don't have an account? Sign Up";
    }
});
</script>
{% endblock %}
