{% extends 'base.html' %}
{% load static %}

{% block title %}Access Zambia Rentals{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:70vh;padding:20px 0">
    <div class="card fade-in-up" style="width:100%;max-width:440px;padding:40px;box-shadow:var(--shadow-xl)">

        <!-- Header -->
        <div style="text-align:center;margin-bottom:32px">
            <div style="width:52px;height:52px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 4px 14px rgba(79,70,229,0.3)">
                <i class="fas fa-home" style="color:#fff;font-size:22px"></i>
            </div>
            <h2 id="authTitle" style="font-size:1.6rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px">Welcome Back</h2>
            <p id="authSubtitle" style="font-size:14px;color:var(--color-text-secondary)">Enter your details to access your account</p>
        </div>

        <form id="authForm" style="display:flex;flex-direction:column;gap:16px">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" id="username" required class="form-input" placeholder="your_username">
            </div>

            <div id="extraFields" class="hidden" style="display:none;flex-direction:column;gap:16px">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Account Type</label>
                    <select id="user_type" class="form-select">
                        <option value="TENANT">Tenant / Property Seeker</option>
                        <option value="LANDLORD">Landlord / Property Owner</option>
                        <option value="ZRA">ZRA Official</option>
                        <option value="MINISTRY">Ministry Official</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" required class="form-input" placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
                <span id="btnText">Sign In</span>
            </button>
        </form>

        <div style="text-align:center;margin-top:24px">
            <button id="toggleAuth" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--color-primary);font-weight:600;padding:4px 8px;border-radius:6px;transition:background .15s" onmouseover="this.style.background='var(--color-primary-light)'" onmouseout="this.style.background='none'">
                Don't have an account? Create one
            </button>
        </div>

        <div id="authMessage" class="alert hidden" style="margin-top:16px;display:none"></div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{% static 'js/auth.js' %}"></script>
<script>
// Wire extraFields toggle to CSS display
const _extraFields = document.getElementById('extraFields');
const _orig = window._authToggleHandler;
document.getElementById('toggleAuth').addEventListener('click', () => {
    const isHidden = _extraFields.style.display === 'none' || _extraFields.style.display === '';
    _extraFields.style.display = isHidden ? 'flex' : 'none';
});
</script>
{% endblock %}
