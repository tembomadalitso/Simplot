{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Zambia Rentals | Modern Housing{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    {% block extra_head %}{% endblock %}

    <script>
        window.URLS = {
            index: "{% url 'index' %}",
            login: "{% url 'login' %}",
            dashboard: "{% url 'dashboard' %}",
            zraDashboard: "{% url 'zra-dashboard' %}",
            occupancyDashboard: "{% url 'occupancy-dashboard' %}",
            addProperty: "{% url 'add-property' %}",
            apiProperties: "/api/properties/",
            apiRentals: "/api/rentals/",
            apiExpenses: "/api/expenses/",
            authLogin: "/auth/token/login/",
            authUsers: "/auth/users/",
            authMe: "/auth/users/me/",
            authLogout: "/auth/token/logout/",
            propertyDetail: "{% url 'property-detail' 0 %}",
        };
    </script>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-logo">
            <i class="fas fa-home" style="margin-right:10px;font-size:2rem;vertical-align:middle"></i>ZAMBIA RENTALS
        </div>
        <div class="splash-subtitle">Powered by Simplot</div>
        <div class="splash-loader"></div>
    </div>

    {% include 'navbar.html' %}

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 md:py-14 fade-in">
        {% block content %}{% endblock %}
    </main>

    {% include 'footer.html' %}

    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/logout.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
