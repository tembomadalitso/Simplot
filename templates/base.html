{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Zambia Rentals | Modern Housing{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    {% block extra_head %}{% endblock %}

    <script>
        window.URLS = {
            index: "{% url 'index' %}",
            login: "{% url 'login' %}",
            dashboard: "{% url 'dashboard' %}",
            zraDashboard: "{% url 'zra-dashboard' %}",
            occupancyDashboard: "{% url 'occupancy-dashboard' %}",
            addProperty: "{% url 'add-property' %}",
            apiProperties: "/api/properties/",
            apiRentals: "/api/rentals/",
            apiExpenses: "/api/expenses/",
            authLogin: "/auth/token/login/",
            authUsers: "/auth/users/",
            authMe: "/auth/users/me/",
            authLogout: "/auth/token/logout/",
            propertyDetail: "{% url 'property-detail' 0 %}",
        };
    </script>

    <style>
        /* Custom Splash Layout for Premium Feel */
        #splash-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #splash-screen.hidden-splash { opacity: 0; visibility: hidden; }

        .splash-content {
            text-align: center;
            animation: splashIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes splashIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .splash-logo-box {
            width: 64px;
            height: 64px;
            background: var(--color-primary);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.2);
            color: #fff;
            font-size: 28px;
        }

        .splash-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--slate-900);
            margin-bottom: 8px;
        }

        .splash-loader-bar {
            width: 120px;
            height: 4px;
            background: var(--slate-100);
            border-radius: 2px;
            margin: 24px auto 0;
            overflow: hidden;
            position: relative;
        }

        .splash-loader-bar::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 40%;
            background: var(--color-primary);
            border-radius: 2px;
            animation: loadingMove 1.5s infinite ease-in-out;
        }

        @keyframes loadingMove {
            0% { left: -40%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen antialiased">

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-content">
            <div class="splash-logo-box">
                <i class="fas fa-home"></i>
            </div>
            <div class="splash-title">ZAMBIA RENTALS</div>
            <div class="text-slate-400 font-medium text-sm tracking-wide">PREMIUM REAL ESTATE</div>
            <div class="splash-loader-bar"></div>
        </div>
    </div>

    {% include 'navbar.html' %}

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 animate-fade-in">
        {% block content %}{% endblock %}
    </main>

    {% include 'footer.html' %}

    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/logout.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
