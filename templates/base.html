{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Zambia Rentals | Modern Housing{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth_additions.css' %}">
    {% block extra_head %}{% endblock %}

    <script>
        window.URLS = {
            index: "{% url 'index' %}",
            login: "{% url 'auth-login-page' %}",
            dashboard: "{% url 'dashboard' %}",
            zraDashboard: "{% url 'zra-dashboard' %}",
            occupancyDashboard: "{% url 'occupancy-dashboard' %}",
            addProperty: "{% url 'add-property' %}",
            apiProperties: "/api/properties/",
            apiRentals: "/api/rentals/",
            apiExpenses: "/api/expenses/",
            authLogin: "/auth/token/login/",
            authRegister: "/auth/register/",
            authUsers: "/auth/users/",
            authMe: "/auth/users/me/",
            authLogout: "/auth/token/logout/",
            authSendCode: "/auth/send-code/",
            authVerify: "/auth/verify-email/",
            authPasswordReset: "/auth/password-reset/",
            authPasswordResetConfirm: "/auth/password-reset/confirm/",
            propertyDetail: "{% url 'property-detail' 0 %}",
        };
    </script>

    <style>
        /* ── SIDEBAR-AWARE MAIN WRAPPER ── */
        /* When body has a sidebar-page class, remove the standard padding from <main> */
        body.dashboard-page > main,
        body.zra-page > main,
        body.ministry-page > main {
            max-width: 100% !important;
            padding: 0 !important;
            overflow: hidden;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen antialiased" data-theme="dark">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.body.setAttribute('data-theme', savedTheme);
        })();
    </script>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-content">
            <div class="splash-logo-box">
                <i class="fas fa-home"></i>
            </div>
            <div class="splash-title">ZAMBIA RENTALS</div>
            <div class="splash-subtitle">Premium Real Estate</div>
            <div class="splash-loader-bar"></div>
        </div>
    </div>

    {% include 'navbar.html' %}

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 animate-fade-in">
        {% block content %}{% endblock %}
    </main>

    {% include 'footer.html' %}

    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/logout.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
