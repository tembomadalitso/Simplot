{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Zambia Rentals | Modern Housing{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col animated-bg">

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-logo">
            <i class="fas fa-home"></i> ZAMBIA RENTALS
        </div>
        <div class="text-xl mt-4 text-white/80 font-medium">Powered by Simplot</div>
        <div class="splash-loader"></div>
    </div>

    {% include 'navbar.html' %}

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12 fade-in">
        {% block content %}
        {% endblock %}
    </main>

    {% include 'footer.html' %}

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.classList.add('hidden-splash');
                    setTimeout(() => splash.remove(), 800); // Remove from DOM after fade out
                }
            }, 1000);
        });
    </script>
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/logout.js' %}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
