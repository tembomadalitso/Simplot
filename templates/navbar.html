{% load static %}
<nav class="glass sticky top-0 z-50 border-b border-white/30 transition-all duration-300" style="padding: 0;">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">

            <!-- Logo -->
            <a href="{% url 'index' %}" class="flex items-center gap-2.5 group" style="text-decoration:none">
                <div style="width:34px;height:34px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(79,70,229,0.3);transition:transform .2s,box-shadow .2s">
                    <i class="fas fa-home" style="color:#fff;font-size:15px"></i>
                </div>
                <span style="font-size:1rem;font-weight:800;letter-spacing:-0.03em;background:linear-gradient(135deg,#4f46e5,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">
                    ZAMBIA RENTALS
                </span>
            </a>

            <!-- Center Nav Links -->
            <div class="hidden md:flex items-center gap-1" id="desktopNavLinks">
                <a href="{% url 'index' %}" class="nav-link px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 transition-all duration-150">
                    Find Homes
                </a>
            </div>

            <!-- Right: Auth Section -->
            <div class="flex items-center gap-3" id="authSection">

                <!-- User Profile Badge (shown when logged in) -->
                <div id="userProfileBadge" class="hidden items-center gap-3">
                    <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--color-primary-light),#e0e7ff);border:2px solid var(--color-primary);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 3px rgba(79,70,229,0.12);flex-shrink:0">
                        <span id="userInitials" style="font-size:13px;font-weight:800;color:var(--color-primary)"></span>
                    </div>
                    <div class="hidden sm:flex flex-col" style="min-width:0">
                        <span id="userName" style="font-size:13px;font-weight:700;color:var(--color-text-primary);line-height:1.3;white-space:nowrap">User</span>
                        <span id="userRoleBadge" class="badge badge-primary" style="margin-top:2px;font-size:9px">Role</span>
                    </div>
                </div>

                <!-- Dashboard Button (role-set by JS) -->
                <a href="#" id="dashboardBtn" class="hidden items-center gap-2" style="text-decoration:none">
                    <!-- Content set by navbar.js -->
                </a>

                <!-- Login Button -->
                <a href="{% url 'login' %}" id="authBtn" class="btn btn-primary" style="font-size:13px;padding:8px 18px">
                    <i class="fas fa-sign-in-alt"></i> Login
                </a>

                <!-- Logout Button -->
                <button id="logoutBtn" class="hidden btn btn-ghost btn-sm items-center gap-2" title="Logout" style="color:var(--color-text-secondary)">
                    <i class="fas fa-sign-out-alt"></i>
                    <span class="hidden sm:inline">Logout</span>
                </button>

            </div>
        </div>
    </div>
</nav>

<script src="{% static 'js/navbar.js' %}"></script>
