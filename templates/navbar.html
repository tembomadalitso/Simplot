{% load static %}
<nav class="top-nav">
    <!-- Search / Info Bar (Optional as per user) -->
    <div class="flex items-center gap-4 flex-1">
        <div class="relative w-full max-w-xs group">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-muted transition-colors group-focus-within:text-primary"></i>
            <input type="text" placeholder="Search listing ID, tenant name..." class="filter-input w-full pl-11 group-focus:border-primary">
        </div>
    </div>

    <!-- Right section -->
    <div class="flex items-center gap-6" id="topNavActions">
        <!-- Theme Toggle -->
        <button id="themeToggle" class="theme-toggle" title="Toggle Theme">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>

        <!-- Profile badge -->
        <div id="userProfileBadge" class="nav-profile flex items-center gap-3 cursor-pointer p-1 rounded-full hover:bg-surface-solid transition-colors" style="display:none; border-left: none;">
            <div class="nav-profile-avatar">
                <span id="userInitials" class="nav-profile-initials"></span>
            </div>
            <div class="hidden sm:flex flex-col min-w-0">
                <span id="userName" class="text-sm font-bold truncate"></span>
                <span id="userRoleBadge" class="text-[9px] font-black uppercase tracking-widest text-muted"></span>
            </div>
            <i class="fas fa-chevron-down text-[10px] text-muted ml-1"></i>
        </div>

        <!-- Auth Section -->
        <div id="authLinks" class="flex gap-4 items-center">
            <a href="{% url 'login' %}" id="authBtn" class="btn btn-primary btn-sm px-6">
                Sign In
            </a>
        </div>

        <!-- Logout (Slim version for top nav) -->
        <button id="logoutBtn" class="btn btn-ghost btn-sm px-4" style="display:none;">
            <i class="fas fa-sign-out-alt"></i>
        </button>
    </div>
</nav>
