{% load static %}
<nav id="main-nav" style="position:sticky;top:0;z-index:50;padding:0;transition:all .3s ease;border-bottom:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);background:rgba(7,7,26,0.75)">
    <div style="max-width:1280px;margin:0 auto;padding:0 24px">
        <div style="display:flex;justify-content:space-between;align-items:center;height:66px">

            <!-- Logo -->
            <a href="{% url 'index' %}" style="display:flex;align-items:center;gap:12px;text-decoration:none">
                <div style="width:36px;height:36px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:11px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(79,70,229,0.4);flex-shrink:0;transition:transform .2s" onmouseover="this.style.transform='scale(1.08)'" onmouseout="this.style.transform='scale(1)'">
                    <i class="fas fa-home" style="color:#fff;font-size:15px"></i>
                </div>
                <div style="display:flex;flex-direction:column;line-height:1">
                    <span class="nav-logo-text-main" style="font-size:13px;font-weight:900;letter-spacing:-0.02em;color:#fff">ZAMBIA</span>
                    <span class="nav-logo-text-sub" style="font-size:10px;font-weight:700;letter-spacing:0.18em;color:#a5b4fc;margin-top:2px">RENTALS</span>
                </div>
            </a>

            <!-- Center links -->
            <div class="hidden md:flex" style="gap:2px;align-items:center" id="desktopNavLinks">
                <a href="{% url 'index' %}" class="nav-center-link" style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.65);padding:7px 14px;border-radius:10px;text-decoration:none;transition:all .15s" onmouseover="this.style.background='rgba(255,255,255,0.08)';this.style.color='#fff'" onmouseout="this.style.background='transparent';this.style.color='rgba(255,255,255,0.65)'">
                    Find Homes
                </a>
            </div>

            <!-- Right section -->
            <div style="display:flex;align-items:center;gap:10px" id="authSection">

                <!-- Profile badge -->
                <div id="userProfileBadge" style="display:none;align-items:center;gap:10px;padding-left:12px;border-left:1px solid rgba(255,255,255,0.1)">
                    <div class="nav-profile-badge" style="width:36px;height:36px;border-radius:50%;background:rgba(79,70,229,0.35);border:2px solid rgba(165,180,252,0.45);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 0 3px rgba(165,180,252,0.1)">
                        <span id="userInitials" style="font-size:12px;font-weight:800;color:#c7d2fe"></span>
                    </div>
                    <div class="hidden sm:flex" style="flex-direction:column;min-width:0">
                        <span id="userName" style="font-size:13px;font-weight:700;color:#fff;line-height:1.2;white-space:nowrap"></span>
                        <span id="userRoleBadge" style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;color:rgba(165,180,252,0.65);margin-top:2px"></span>
                    </div>
                </div>

                <!-- Dashboard button -->
                <a href="#" id="dashboardBtn" style="display:none;text-decoration:none"></a>

                <!-- Login -->
                <a href="{% url 'login' %}" id="authBtn" style="display:flex;align-items:center;gap:7px;padding:9px 18px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border-radius:11px;font-size:13px;font-weight:700;text-decoration:none;transition:all .18s;box-shadow:0 2px 12px rgba(79,70,229,0.35)" onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 6px 18px rgba(79,70,229,0.45)'" onmouseout="this.style.transform='';this.style.boxShadow='0 2px 12px rgba(79,70,229,0.35)'">
                    <i class="fas fa-sign-in-alt" style="font-size:11px"></i> Sign In
                </a>

                <!-- Logout -->
                <button id="logoutBtn" style="display:none;align-items:center;gap:6px;padding:8px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.55);border-radius:10px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s" onmouseover="this.style.background='rgba(239,68,68,0.15)';this.style.borderColor='rgba(239,68,68,0.3)';this.style.color='#fca5a5'" onmouseout="this.style.background='rgba(255,255,255,0.06)';this.style.borderColor='rgba(255,255,255,0.12)';this.style.color='rgba(255,255,255,0.55)'">
                    <i class="fas fa-sign-out-alt" style="font-size:11px"></i>
                    <span class="hidden sm:inline">Logout</span>
                </button>
            </div>
        </div>
    </div>
</nav>
<script src="{% static 'js/navbar.js' %}"></script>
