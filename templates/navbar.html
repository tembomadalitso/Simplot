{% load static %}
<nav class="glass sticky top-0 z-50 border-b border-slate-200/40" style="padding: 0;">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-20">

            <!-- Logo -->
            <a href="{% url 'index' %}" class="flex items-center gap-3.5 group" style="text-decoration:none">
                <div class="w-10 h-10 bg-indigo-600 rounded-[14px] flex items-center justify-center shadow-[0_8px_16px_-4px_rgba(79,70,229,0.3)] transition-transform duration-300 group-hover:scale-110">
                    <i class="fas fa-home text-white text-lg"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-sm font-black tracking-tight text-slate-900 leading-none">ZAMBIA</span>
                    <span class="text-[11px] font-bold tracking-[0.2em] text-indigo-600 leading-none mt-1">RENTALS</span>
                </div>
            </a>

            <!-- Center Nav Links -->
            <div class="hidden md:flex items-center gap-2" id="desktopNavLinks">
                <a href="{% url 'index' %}" class="nav-link font-bold text-sm text-slate-600 hover:text-indigo-600 px-4 py-2.5 rounded-xl transition-all duration-200">
                    Discover Properties
                </a>
            </div>

            <!-- Right: Auth Section -->
            <div class="flex items-center gap-4" id="authSection">

                <!-- User Profile Badge (shown when logged in) -->
                <div id="userProfileBadge" class="hidden items-center gap-3 pl-4 border-l border-slate-200">
                    <div class="w-10 h-10 rounded-full bg-slate-100 border-2 border-white shadow-sm flex items-center justify-center overflow-hidden">
                        <span id="userInitials" class="text-xs font-black text-slate-600"></span>
                    </div>
                    <div class="hidden lg:flex flex-col">
                        <span id="userName" class="text-sm font-bold text-slate-900 leading-none">User</span>
                        <span id="userRoleBadge" class="text-[10px] font-bold text-slate-400 mt-1">Role</span>
                    </div>
                </div>

                <!-- Dashboard Button (role-set by JS) -->
                <a href="#" id="dashboardBtn" class="hidden"></a>

                <!-- Login Button -->
                <a href="{% url 'login' %}" id="authBtn" class="btn btn-primary btn-sm px-6">
                    Sign In
                </a>

                <!-- Logout Button -->
                <button id="logoutBtn" class="hidden text-slate-400 hover:text-red-500 transition-colors duration-200" title="Sign Out">
                    <i class="fas fa-power-off text-lg"></i>
                </button>

            </div>
        </div>
    </div>
</nav>

<script src="{% static 'js/navbar.js' %}"></script>
