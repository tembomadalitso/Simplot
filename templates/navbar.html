{% load static %}
<nav id="main-nav">
    <div class="nav-container">
        <div class="nav-content">

            <!-- Sidebar Toggle (for layout consistency with new sidebar) -->
            <button id="sidebarToggle" class="theme-toggle mr-4 md:hidden" title="Toggle Sidebar">
                <i class="fas fa-bars"></i>
            </button>

            <!-- Logo -->
            <a href="{% url 'index' %}" class="nav-logo">
                <div class="nav-logo-icon">
                    <i class="fas fa-home" style="color:#fff;font-size:15px"></i>
                </div>
                <div class="nav-logo-text">
                    <span class="nav-logo-main">ZAMBIA</span>
                    <span class="nav-logo-sub">RENTALS</span>
                </div>
            </a>

            <!-- Global Search (Adapting from new dashboard features) -->
            <div class="hidden lg:flex items-center ml-8 flex-1 max-w-md">
                <div class="relative w-full group">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-muted transition-colors group-focus-within:text-primary"></i>
                    <input type="text" placeholder="Search listing ID, area, or name..." class="form-input w-full pl-11 bg-surface border-none shadow-none focus:bg-surface-solid" style="height: 40px; border-radius: 10px;">
                </div>
            </div>

            <!-- Right section -->
            <div style="display:flex;align-items:center;gap:12px" id="authSection" class="ml-auto">

                <!-- Theme Toggle -->
                <button id="themeToggle" class="theme-toggle" title="Toggle Theme">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>

                <!-- Profile dropdown-ready badge -->
                <div id="userProfileBadge" class="nav-profile cursor-pointer hover:bg-surface rounded-xl p-1 transition-all" style="display:none; border-left: none;">
                    <div class="nav-profile-avatar">
                        <span id="userInitials" class="nav-profile-initials"></span>
                    </div>
                    <div class="hidden sm:flex nav-profile-info">
                        <span id="userName" class="nav-profile-name"></span>
                        <span id="userRoleBadge" class="nav-profile-role"></span>
                    </div>
                    <i class="fas fa-chevron-down text-[10px] text-muted ml-1"></i>
                </div>

                <!-- Login -->
                <a href="{% url 'login' %}" id="authBtn" class="nav-btn">
                    <i class="fas fa-sign-in-alt" style="font-size:11px"></i> Sign In
                </a>

                <!-- Logout (Icon only for top bar) -->
                <button id="logoutBtn" class="theme-toggle" style="display:none;" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </div>
</nav>
<script src="{% static 'js/navbar.js' %}"></script>
